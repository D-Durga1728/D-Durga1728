name: Deploy Snake & GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Setup Node.js 24
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Set Git user info
      - name: Set Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. Generate Snake SVG
      - uses: Platane/snk@v3
        with:
          github_user_name: D-Durga1728
          outputs: |
            dist/github-contribution-grid-snake.svg

      # 5. Deploy snake SVG to GitHub Pages or output branch
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output  # or gh-pages if you prefer
          build_dir: dist
          github_token: ${{ secrets.GITHUB_TOKEN }}
