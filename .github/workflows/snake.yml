name: Deploy Site with Snake

on:
  push:
    branches:
      - main  # deploys on push to main
  schedule:
    - cron: "0 */12 * * *"  # regenerate snake every 12 hours
  workflow_dispatch:        # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-with-snake:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Install dependencies (adjust if needed)
      - name: Install dependencies
        run: npm ci

      # 4. Build your site (adjust build command)
      - name: Build site
        run: npm run build

      # 5. Generate GitHub contribution snake
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: D-Durga1728
          outputs: |
            build/github-contribution-grid-snake.svg

      # 6. Deploy everything to gh-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: gh-pages      # branch for GitHub Pages
          build_dir: ./build           # folder containing site + snake
          github_token: ${{ secrets.GITHUB_TOKEN }}
